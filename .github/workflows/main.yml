  name: Daily News Email

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Collect news and send email
        uses: actions/github-script@v7
        with:
          script: |
            const ANTHROPIC_KEY = process.env.ANTHROPIC_API_KEY;
            const SUPA_URL = process.env.SUPABASE_URL;
            const SUPA_KEY = process.env.SUPABASE_ANON_KEY;
            const BASE_URL = 'https://news-digest-tau-umber.vercel.app';

            async function fetchJSON(url, opts) {
  const res = await fetch(url, opts);
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    console.log('fetchJSON 오류 (' + res.status + '): ' + text.slice(0, 200));
    return {};
  }
}
            async function collectNews(label, isWar) {
              const warPrompt = `Today, search the web for the latest developments in the Iran-US-Israel war. Return the 3 most important items in this EXACT format only:\n##1##Title||[Military] content. [Political] content. [Economic] content. [Korea] content.\n##2##Title||[Military] content. [Political] content. [Economic] content. [Korea] content.\n##3##Title||[Military] content. [Political] content. [Economic] content. [Korea] content.`;
              const genPrompt = `Search the web for today's top 3 ${label} news items that impact the world. For each item include: 1) Key content 2) Global impact 3) Impact on Korea. Use this EXACT format only:\n##1##Title||[Key] content. [Global] content. [Korea] content.\n##2##Title||[Key] content. [Global] content. [Korea] content.\n##3##Title||[Key] content. [Global] content. [Korea] content.`;
              const prompt = isWar ? warPrompt : genPrompt;
              const messages = [{ role: 'user', content: prompt }];
              let finalText = '';

              for (let i = 0; i < 5; i++) {
                console.log('API 호출: ' + label + ' (시도 ' + (i+1) + ')');
                const data = await fetchJSON('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': ANTHROPIC_KEY,
                    'anthropic-version': '2023-06-01',
                  },
                  body: JSON.stringify({
                    model: 'claude-sonnet-4-5-20250929',
                    max_tokens: 4000,
                    tools: [{ type: 'web_search_20250305', name: 'web_search' }],
                    messages
                  })
                });
                const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
                if (data.error) { console.log('API 오류: ' + JSON.stringify(data.error)); break; }
                const toolUses = (data.content||[]).filter(b=>b.type==='tool_use');
                if (data.stop_reason==='end_turn' && textBlocks) { finalText=textBlocks; break; }
                if (!toolUses.length) { finalText=textBlocks; break; }
                messages.push({ role:'assistant', content:data.content });
                messages.push({ role:'user', content:toolUses.map(t=>({ type:'tool_result', tool_use_id:t.id, content:'Done. Reply in ##N##Title||content format only.' })) });
              }

              const items = [];
              for (const line of finalText.split('\n')) {
                const m = line.match(/##\d+##(.+)\|\|(.+)/);
                if (m) items.push({ title: m[1].trim(), summary: m[2].trim() });
              }
              console.log('Raw text: ' + finalText.slice(0, 200));
              return items;
            }

            async function saveToSupabase(key, label, items) {
              const res = await fetch(SUPA_URL + '/rest/v1/news_cache', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': SUPA_KEY,
                  'Authorization': 'Bearer ' + SUPA_KEY,
                  'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ section_key: key, section_label: label, items })
              });
              console.log('Saved ' + label + ': ' + res.status);
            }

            const SECTIONS = [
              { key: 'us_politics', label: 'US Politics', isWar: false },
              { key: 'us_economy', label: 'US Economy', isWar: false },
              { key: 'war', label: 'Iran-US-Israel War', isWar: true },
            ];

            const allSections = {};
            for (let i = 0; i < SECTIONS.length; i++) {
              const s = SECTIONS[i];
              console.log('Collecting: ' + s.label);
              const items = await collectNews(s.label, s.isWar);
              console.log('Done: ' + s.label + ' - ' + items.length + ' items');
              await saveToSupabase(s.key, s.label, items);
              allSections[s.key] = items;
              if (i < SECTIONS.length - 1) {
                console.log('Waiting 30s...');
                await new Promise(r => setTimeout(r, 60000));
              }
            }

            const subData = await fetchJSON(SUPA_URL + '/rest/v1/subscribers?active=eq.true', {
              headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
            });

            await fetchJSON(BASE_URL + '/api/send', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ subscribers: subData, sections: allSections })
            });

            console.log('All done!');
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
