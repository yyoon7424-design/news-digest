name: Daily News Email

on:
  schedule:
    - cron: '50 10 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily news
        run: |
          curl -X GET "https://news-digest-tau-umber.vercel.app/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
