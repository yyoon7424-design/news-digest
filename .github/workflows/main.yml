name: Daily News Email

on:
  schedule:
    - cron: '50 22 * * *'  # UTC 22:50 = 한국시간 07:50
  workflow_dispatch:  # 수동 실행 가능

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily news
        run: |
          curl -X GET "https://news-digest-tau-umber.vercel.app/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
