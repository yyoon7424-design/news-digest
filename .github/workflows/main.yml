name: Daily News Email

on:
  schedule:
    - cron: '20 10 * * *'  # UTC 10:20 = 한국시간 19:20
  workflow_dispatch::  # 수동 실행 가능

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily news
        run: |
          curl -X GET "https://news-digest-tau-umber.vercel.app/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
